[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=10

# Custom markers for test categorization
markers =
    slow: marks tests as slow (integration tests, network calls)
    network: marks tests requiring network access
    integration: marks integration tests

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    # Exclude legacy files (not part of refactoring)
    src/devonzot_service.py
    src/devonzot_add_new.py
    src/create_zotero_item_from_url.py
    src/test_article_extract.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
